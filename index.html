<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Class Marks Entry</title>

  <style>
    /* Aesthetic Color Palette & Typography */
    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 15px; background-color: #eef2f5; margin: 0; color: #334155; }
    
    .container { max-width: 500px; margin: auto; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 80vh; border-top: 6px solid #4a90e2; position: relative; }
    .table-container-wrapper { max-width: 100%; overflow-x: auto; margin: auto; background: #ffffff; padding: 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 80vh; border-top: 6px solid #64748b; }
    
    /* School Branding Headers */
    .school-name { text-align: center; color: #1e3a8a; margin: 0 0 5px 0; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
    .event-name { text-align: center; color: #4338ca; margin: 0 0 5px 0; font-size: 18px; font-weight: 600; }
    .test-name { text-align: center; color: #64748b; margin: 0 0 20px 0; font-size: 16px; font-weight: 500; }
    
    .divider { border: 0; border-top: 1px solid #e2e8f0; margin: 25px 0 15px 0; }
    
    /* Page Titles */
    h2 { text-align: center; color: #334155; margin-top: 0; margin-bottom: 5px; font-size: 20px; }
    h3 { color: #64748b; text-align: center; margin-bottom: 20px; margin-top: 5px; font-weight: normal; font-size: 16px; }
    
    /* Page Navigation */
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Grids for Buttons */
    .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .list-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; }
    
    /* ------------------------------------- */
    /* 3D Button Styles & Hover Effects      */
    /* ------------------------------------- */
    button { 
      padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 8px; 
      transition: all 0.15s ease; position: relative;
    }
    
    /* Default Navigation Buttons */
    .nav-btn { 
      background-color: #f8fafc; color: #334155; border: 1px solid #e2e8f0; 
      box-shadow: 0 4px 0 #cbd5e1, 0 5px 10px rgba(0,0,0,0.05); 
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #cbd5e1, 0 8px 15px rgba(0,0,0,0.1); }
    .nav-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent !important; }
    
    /* Blue Action Button (Save) */
    .action-btn { 
      background-color: #3b82f6; color: white; width: 100%; margin-top: 25px; font-size: 18px; 
      box-shadow: 0 4px 0 #2563eb, 0 5px 15px rgba(59, 130, 246, 0.3); 
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #2563eb, 0 8px 20px rgba(59, 130, 246, 0.4); }
    .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
    
    /* Yellow Edit Button */
    .edit-btn { 
      background-color: #f59e0b; color: white; width: 100%; margin-top: 25px; font-size: 18px; display: none; 
      box-shadow: 0 4px 0 #d97706, 0 5px 15px rgba(245, 158, 11, 0.3); 
    }
    .edit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #d97706, 0 8px 20px rgba(245, 158, 11, 0.4); }
    .edit-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
    
    /* Minimal Report Button */
    .report-btn { 
      background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; width: 100%; font-size: 15px; 
      box-shadow: 0 4px 0 #94a3b8, 0 5px 10px rgba(0,0,0,0.05); 
    }
    .report-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #94a3b8, 0 8px 15px rgba(0,0,0,0.1); }
    .report-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
    
    /* Back Button (Exempt from 3D blockiness) */
    .back-btn { 
      background-color: transparent; color: #3b82f6; padding: 0; margin-bottom: 20px; font-size: 15px; 
      width: auto; font-weight: bold; box-shadow: none !important; transform: none !important; 
    }
    .back-btn:hover { color: #2563eb; transform: translateX(-3px) !important; box-shadow: none !important; }
    .back-btn:active { transform: translateX(0) !important; }

    /* ------------------------------------- */
    /* Page-Specific Division Button Colors  */
    /* ------------------------------------- */
    
    /* Entry Page: Light Green */
    .page1-div { background-color: #d1fae5; border-color: #a7f3d0; box-shadow: 0 4px 0 #6ee7b7, 0 5px 10px rgba(0,0,0,0.05); }
    .page1-div:hover { box-shadow: 0 6px 0 #6ee7b7, 0 8px 15px rgba(0,0,0,0.1); }
    
    /* Full Report: Light Pink */
    .full-div { background-color: #fce7f3; border-color: #fbcfe8; box-shadow: 0 4px 0 #f9a8d4, 0 5px 10px rgba(0,0,0,0.05); }
    .full-div:hover { box-shadow: 0 6px 0 #f9a8d4, 0 8px 15px rgba(0,0,0,0.1); }

    /* Top 10: Light Blue */
    .top10-div { background-color: #dbeafe; border-color: #bfdbfe; box-shadow: 0 4px 0 #93c5fd, 0 5px 10px rgba(0,0,0,0.05); }
    .top10-div:hover { box-shadow: 0 6px 0 #93c5fd, 0 8px 15px rgba(0,0,0,0.1); }

    /* ------------------------------------- */
    /* Light Pastel Rainbow For Subjects     */
    /* ------------------------------------- */
    .sub-1 { background-color: #ffe4e6; border-color: #fecdd3; box-shadow: 0 4px 0 #fda4af, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-1:hover { box-shadow: 0 6px 0 #fda4af, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-2 { background-color: #ffedd5; border-color: #fed7aa; box-shadow: 0 4px 0 #fdba74, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-2:hover { box-shadow: 0 6px 0 #fdba74, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-3 { background-color: #fef3c7; border-color: #fde68a; box-shadow: 0 4px 0 #fcd34d, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-3:hover { box-shadow: 0 6px 0 #fcd34d, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-4 { background-color: #d1fae5; border-color: #a7f3d0; box-shadow: 0 4px 0 #6ee7b7, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-4:hover { box-shadow: 0 6px 0 #6ee7b7, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-5 { background-color: #ccfbf1; border-color: #a5f3fc; box-shadow: 0 4px 0 #67e8f9, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-5:hover { box-shadow: 0 6px 0 #67e8f9, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-6 { background-color: #dbeafe; border-color: #bfdbfe; box-shadow: 0 4px 0 #93c5fd, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-6:hover { box-shadow: 0 6px 0 #93c5fd, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-7 { background-color: #e0e7ff; border-color: #c7d2fe; box-shadow: 0 4px 0 #a5b4fc, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-7:hover { box-shadow: 0 6px 0 #a5b4fc, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-8 { background-color: #fae8ff; border-color: #f5d0fe; box-shadow: 0 4px 0 #e879f9, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-8:hover { box-shadow: 0 6px 0 #e879f9, 0 8px 15px rgba(0,0,0,0.1); }
    
    .sub-9 { background-color: #fce7f3; border-color: #fbcfe8; box-shadow: 0 4px 0 #f9a8d4, 0 5px 10px rgba(0,0,0,0.05); }
    .sub-9:hover { box-shadow: 0 6px 0 #f9a8d4, 0 8px 15px rgba(0,0,0,0.1); }
    /* ------------------------------------- */
    
    /* Student List Form */
    .student-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    .student-name { font-size: 16px; font-weight: 500; color: #475569; flex-grow: 1; padding-right: 10px; }
    .mark-input { width: 70px; padding: 10px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; color: #1e293b; font-weight: bold; background-color: #f8fafc; transition: border-color 0.2s; }
    .mark-input:focus { outline: none; border-color: #3b82f6; background-color: #ffffff; }
    .mark-input:disabled { background-color: #e2e8f0; color: #64748b; border-color: #e2e8f0; cursor: not-allowed; }
    
    #message { text-align: center; font-weight: bold; margin-top: 20px; min-height: 24px; padding: 10px; border-radius: 6px; }

    /* Data Table Styles */
    .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .marks-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .marks-table th, .marks-table td { padding: 8px 4px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; text-align: center; }
    .marks-table th { background-color: #f8fafc; color: #334155; font-weight: 700; white-space: normal; line-height: 1.2; font-size: 12px; }
    .marks-table td:first-child, .marks-table th:first-child { text-align: left; white-space: nowrap; padding-left: 8px; }
    
    /* Zebra Striping */
    .marks-table tbody tr:nth-child(odd) { background-color: #ffffff; }
    .marks-table tbody tr:nth-child(even) { background-color: #f1f5f9; }
    
    #loadingIndicator { text-align: center; color: #3b82f6; font-weight: bold; margin: 30px 0; font-size: 18px; }

    /* Developer Credit Styles */
    .developer-credit { text-align: center; margin-top: 20px; font-size: 13px; color: #94a3b8; font-weight: 500; letter-spacing: 0.3px; }
  </style>
</head>

    </div>

    <!-- PAGE 3: Enter Marks -->
    <div id="page3" class="page">
      <button class="back-btn" onclick="showPage('page2')">← Back to Subjects</button>

      <h3 id="marksSubtitle"></h3>
      <div id="studentListContainer"></div>
      
      <button id="saveBtn" class="action-btn" onclick="saveMarks()">Save All Marks</button>
      <button id="editBtn" class="edit-btn" onclick="enableEditing()">✏️ Edit Marks</button>
      
      <div id="message"></div>
    </div>

    <!-- PAGE 4: Select Report Type -->
    <div id="page4" class="page">
      <button class="back-btn" onclick="showPage('page1')">← Back to Home</button>

      <h3>Select report type</h3>

        <button class="nav-btn" onclick="selectReportType('top10')">🏆 Top 10 Students</button>
      </div>
    </div>

      </div>
    </div>
  </div>

    const subjectsList = ['Language 1', 'Language 2', 'English', 'Hindi', 'Social Science', 'Physics', 'Chemistry', 'Biology', 'Mathematics'];
    const currentClass = "10"; 
    let currentDivision = "";
    let currentSubject = "";
    
    let currentReportType = "full"; 
    let currentReportClass = "";

    // REPLACE THIS WITH YOUR APPS SCRIPT URL!
    const scriptURL = 'https://script.google.com/macros/s/AKfycby05tkg3ElQdyLWsIwXICADRJgQYWkJQZkELLdvV-KArxfZNvWQXfgE9LRRrB3Bii-7lQ/exec';

    // Prevent Back History and Close App when Phone's Hardware Back Button is Pressed
    window.history.pushState(null, null, window.location.href);
    window.addEventListener("popstate", function(event) {
      window.close(); // Attempts to securely close the window
      document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px; color:#334155;'>App closed. You can exit this tab.</h2>";
      setTimeout(function() {
        window.location.href = "about:blank"; // Fallback empty page if close() is blocked
      }, 300);
    });

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      
      if(pageId === 'page5') {
        document.getElementById('mainContainer').style.display = 'none';
      } else {
        document.getElementById('mainContainer').style.display = 'block';
      }

      if(document.getElementById('message')) {
        document.getElementById('message').textContent = ""; 
        document.getElementById('message').style.backgroundColor = "transparent";
      }
    }

    // --- LOGIC FOR ENTERING MARKS ---
    function selectDivision(div) {
      currentDivision = div;
      const fullClassName = currentClass + currentDivision;
      document.getElementById('subjectTitleClass').textContent = "Class " + fullClassName;
      showPage('page2');
    }

    function selectSubject(sub) {
      currentSubject = sub;
      const fullClassName = currentClass + currentDivision;
      document.getElementById('marksTitle').textContent = "Class " + fullClassName;
      document.getElementById('marksSubtitle').textContent = sub;
      
      // Reset buttons when opening a new subject
      document.getElementById('saveBtn').style.display = "block";
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('saveBtn').textContent = "Save All Marks";
      document.getElementById('editBtn').style.display = "none";
      
      renderStudentList(fullClassName);
      showPage('page3');
    }

    function renderStudentList(className) {
      const container = document.getElementById('studentListContainer');
      container.innerHTML = ""; 
      const students = studentsData[className];
      
      students.forEach((student, index) => {
        const row = document.createElement('div');
        row.className = 'student-row';
        row.innerHTML = `<div class="student-name">${index + 1}. ${student}</div>
                         <input type="number" class="mark-input" placeholder="0" data-student-name="${student}">`;
        container.appendChild(row);
      });
    }

    function saveMarks() {
      const msg = document.getElementById('message');
      const btn = document.getElementById('saveBtn');
      const fullClassName = currentClass + currentDivision;
      const inputs = document.querySelectorAll('.mark-input');
      const marksToSave = [];

      inputs.forEach(input => {
        const markValue = input.value.trim();
        if (markValue !== "") {
          marksToSave.push({ className: fullClassName, subject: currentSubject, student: input.dataset.studentName, mark: markValue });
        }
      });

      if (marksToSave.length === 0) {
        msg.style.color = "#b91c1c"; msg.style.backgroundColor = "#fee2e2"; msg.textContent = "No marks entered. Nothing to save.";
        return;
      }

      btn.disabled = true; btn.textContent = "Saving...";
      msg.textContent = ""; msg.style.backgroundColor = "transparent";

      fetch(scriptURL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(marksToSave) })
      .then(response => response.json())
      .then(data => {
        if (data.status === "error") {
          msg.style.color = "#b91c1c"; msg.style.backgroundColor = "#fee2e2"; msg.textContent = data.message;
          btn.disabled = false; btn.textContent = "Save All Marks";
        } else {
          msg.style.color = "#15803d"; msg.style.backgroundColor = "#dcfce3"; msg.textContent = data.message;
          
          // Lock inputs and keep marks visible
          inputs.forEach(input => input.disabled = true);
          
          // Swap Save button for Edit button
          btn.style.display = "none";
          document.getElementById('editBtn').style.display = "block";
        }
      })
      .catch(error => {
        msg.style.color = "#b91c1c"; msg.style.backgroundColor = "#fee2e2"; msg.textContent = "Network Error.";
        btn.disabled = false; btn.textContent = "Save All Marks";
      });
    }

    function enableEditing() {
      const inputs = document.querySelectorAll('.mark-input');
      
      // Unlock inputs
      inputs.forEach(input => input.disabled = false);
      
      // Hide Edit button, restore Save button
      document.getElementById('editBtn').style.display = "none";
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.style.display = "block";
      saveBtn.disabled = false;
      saveBtn.textContent = "Save All Marks";
      
      // Clear success message
      const msg = document.getElementById('message');
      msg.textContent = ""; 
      msg.style.backgroundColor = "transparent";
    }

    // --- LOGIC FOR VIEWING REPORTS ---
    function selectReportType(type) {
      currentReportType = type;
      document.getElementById('reportDivisionTitle').textContent = type === 'top10' ? "Top 10 - Select Division" : "Full Report - Select Division";
      
      // Update buttons colors based on report type
      const reportBtns = document.querySelectorAll('#page4a .report-class-btn');
      reportBtns.forEach(btn => {
        btn.className = 'nav-btn report-class-btn ' + (type === 'top10' ? 'top10-div' : 'full-div');
      });
      
      showPage('page4a');
    }

    function fetchAndShowReport(className) {
      currentReportClass = className;
      document.getElementById('reportTitle').textContent = "Class " + className + " Report";
      showPage('page5');
      
      document.getElementById('loadingIndicator').style.display = 'block';
      document.getElementById('tableWrapper').style.display = 'none';

      fetch(scriptURL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: "getMarks", className: className })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "success") {
          buildTable(className, data.data);
        } else {
          document.getElementById('loadingIndicator').textContent = "Error loading data.";
        }
      })
      .catch(error => {
        document.getElementById('loadingIndicator').textContent = "Network error. Please try again.";
      });
    }

    function buildTable(className, fetchedData) {
      let students = studentsData[className];
      
      // Pivot data and calculate totals
      let pivot = {};
      students.forEach(s => { 
        pivot[s] = { total: 0 }; 
      }); 
      
      fetchedData.forEach(row => {
        if(pivot[row.student]) {
          let mark = parseInt(row.mark) || 0;
          pivot[row.student][row.subject] = mark;
          pivot[row.student].total += mark;
        }
      });

      // Filter and Sort based on Report Type
      let displayStudents = [];
      if (currentReportType === 'top10') {
        // Filter out students with 0 total, sort by highest total first, slice the top 10
        displayStudents = [...students]
          .filter(a => pivot[a].total > 0)
          .sort((a, b) => pivot[b].total - pivot[a].total)
          .slice(0, 10);
      } else {
        // Keep alphabetical order for full class report
        displayStudents = students;
      }

      // Build the table
      let titleSuffix = currentReportType === 'top10' ? " (Top 10 Students)" : "";
      let rankHeader = currentReportType === 'top10' ? "Rank" : "No.";
      
      let html = '<div style="padding: 10px; background: white;"><h2 style="text-align: center; margin-bottom: 20px;">SANSKRIT HS VATTOLI - Class ' + className + titleSuffix + '</h2>';
      
      html += '<table class="marks-table"><thead><tr><th>Student Name</th>';
      subjectsList.forEach(sub => html += `<th>${sub}</th>`);
      html += '<th style="background-color: #e2e8f0;">Total</th></tr></thead><tbody>';

      displayStudents.forEach((student, index) => {
        // Decide what number to show next to the name
        let rankOrNo = currentReportType === 'top10' ? (index + 1) : (students.indexOf(student) + 1);
        
        html += `<tr><td>${rankOrNo}. ${student}</td>`;
        
        subjectsList.forEach(sub => {
          let mark = pivot[student][sub] !== undefined ? pivot[student][sub] : '-'; 
          html += `<td>${mark}</td>`;
        });
        
        // Add Total Column
        html += `<td style="font-weight: bold; background-color: #f8fafc;">${pivot[student].total}</td></tr>`;
      });
      html += '</tbody></table></div>';

      document.getElementById('tableWrapper').innerHTML = html;
      document.getElementById('loadingIndicator').style.display = 'none';
      document.getElementById('tableWrapper').style.display = 'block';
    }
  </script>
